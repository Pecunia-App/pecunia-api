name: Build and Test
on:
  pull_request:
    push:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with maven
        run: mvn clean install -DskipTests
      - name: List test resources
        run: ls -l src/main/resources/
      - name: Run unit test
        run: mvn test
